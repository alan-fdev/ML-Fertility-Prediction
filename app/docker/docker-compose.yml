version: '3.8'

services:
  fertility-pro-backend:
    build:
      context: ../
      dockerfile: app/docker/Dockerfile
    container_name: fertility-pro-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    volumes:
      - ../app:/app
      - ../logs:/app/logs
    restart: unless-stopped
    networks:
      - fertility-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: fertility-pro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-config.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - fertility-pro-backend
    restart: unless-stopped
    networks:
      - fertility-network

networks:
  fertility-network:
    driver: bridge

volumes:
  fertility-data:
    driver: local
