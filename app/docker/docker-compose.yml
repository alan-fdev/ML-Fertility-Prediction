version: '3.8'

services:
  fertility-pro-backend:
    build:
      # PUSAT DUNIA KITA NAIKKAN KE ROOT PROYEK:
      context: ../../
      dockerfile: app/docker/Dockerfile
    container_name: fertility-pro-backend
    ports:
      - "5002:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    volumes:
      - ../../app:/app
    restart: unless-stopped
    networks:
      - fertility-network

  nginx:
    image: nginx:alpine
    container_name: fertility-pro-nginx
    ports:
      - "5001:80"
    volumes:
      - ./nginx-config.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fertility-pro-backend
    restart: unless-stopped
    networks:
      - fertility-network

networks:
  fertility-network:
    driver: bridge
